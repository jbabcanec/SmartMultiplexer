<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0e14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#39bae6"/>
      <stop offset="100%" stop-color="#c792ea"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect x="4" y="4" width="504" height="504" rx="92" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.4"/>
  <!-- Terminal prompt chevron > -->
  <path d="M 128 176 L 256 256 L 128 336" fill="none" stroke="#39bae6" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cursor line -->
  <rect x="288" y="232" width="112" height="48" rx="6" fill="#c792ea" opacity="0.9"/>
  <!-- Grid dots (representing multiplexer) -->
  <circle cx="380" cy="148" r="10" fill="#39bae6" opacity="0.5"/>
  <circle cx="420" cy="148" r="10" fill="#39bae6" opacity="0.3"/>
  <circle cx="380" cy="188" r="10" fill="#c792ea" opacity="0.3"/>
  <circle cx="420" cy="188" r="10" fill="#7fd962" opacity="0.4"/>
  <!-- Bottom status bar hint -->
  <rect x="128" y="380" width="80" height="6" rx="3" fill="#39bae6" opacity="0.3"/>
  <rect x="224" y="380" width="48" height="6" rx="3" fill="#c792ea" opacity="0.3"/>
  <rect x="288" y="380" width="64" height="6" rx="3" fill="#7fd962" opacity="0.3"/>
</svg>
